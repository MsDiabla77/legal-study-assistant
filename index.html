<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Legal Study Helper</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="app-shell">
    <header class="topbar">
      <p>AI-powered legal study workspace</p>
      <h1>Legal Study Helper</h1>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="translator" type="button">Translator</button>
      <button class="tab" data-tab="test" type="button">Test Me</button>
      <button class="tab" data-tab="reply" type="button">Reply Ideas</button>
      <button class="tab" data-tab="warnings" type="button">Warnings</button>
      <button class="tab" data-tab="citations" type="button">Citations</button>
      <button class="tab" data-tab="apaPaper" type="button">APA Paper</button>
      <button class="tab" data-tab="professor" type="button">Professor Mode</button>
      <button class="tab" data-tab="studyCards" type="button">Study Cards</button>
    </nav>

    <section class="workspace">

      <article class="tool-panel active" id="translator">
        <h2>Plain English Legal Translator</h2>
        <textarea id="legalInput" placeholder="Paste legal text here..."></textarea>
        <textarea id="translationOutput" readonly placeholder="Plain English explanation will appear here..."></textarea>
        <div class="actions">
          <button id="translateBtn" type="button">Translate</button>
          <button id="copyTranslation" type="button">Copy</button>
          <button id="clearTranslator" type="button">Clear</button>
        </div>
      </article>

      <article class="tool-panel" id="test">
        <h2>Legal Study Practice</h2>
        <select id="studyMode">
          <option value="easy">Easy Review</option>
          <option value="medium">Medium Practice</option>
          <option value="exam">Exam / IRAC Practice</option>
        </select>
        <div id="questionList" class="output-box"></div>
        <div class="actions">
          <button id="makeTest" type="button">Make Questions</button>
          <button id="clearTest" type="button">Clear</button>
        </div>
      </article>

      <article class="tool-panel" id="reply">
        <h2>Discussion Reply Ideas</h2>
        <textarea id="classmatePost" placeholder="Paste your classmate's discussion post..."></textarea>
        <textarea id="replyOutput" readonly placeholder="Reply ideas will appear here..."></textarea>
        <div class="actions">
          <button id="makeReply" type="button">Make Reply Ideas</button>
          <button id="copyReply" type="button">Copy</button>
          <button id="clearReply" type="button">Clear</button>
        </div>
      </article>

      <article class="tool-panel" id="warnings">
        <h2>Spelling, Grammar & Citation Warnings</h2>
        <textarea id="warningInput" placeholder="Paste your draft here to check for grammar, citation, and writing issues..."></textarea>
        <textarea id="warningOutput" readonly placeholder="Warnings will appear here..."></textarea>
        <div class="actions">
          <button id="checkDraft" type="button">Check Draft</button>
          <button id="clearWarnings" type="button">Clear</button>
        </div>
      </article>

      <article class="tool-panel" id="citations">
        <h2>Citation Helper</h2>
        <input id="citeAuthor" placeholder="Author: Last, First">
        <input id="citeTitle" placeholder="Title">
        <input id="citeSource" placeholder="Source / Website / Journal">
        <input id="citeYear" placeholder="Year">
        <input id="citeURL" placeholder="URL">
        <textarea id="citationOutput" readonly placeholder="Citation will appear here..."></textarea>
        <div class="actions">
          <button id="makeAPA" type="button">Make APA</button>
          <button id="makeBluebook" type="button">Make Bluebook</button>
          <button id="clearCitations" type="button">Clear</button>
        </div>
      </article>

      <article class="tool-panel" id="apaPaper">
        <h2>APA 7 Paper Formatter</h2>
        <input id="paperTitle" placeholder="Paper Title">
        <input id="studentName" placeholder="Your Name">
        <input id="schoolName" placeholder="School Name">
        <input id="courseName" placeholder="Course Name">
        <input id="instructorName" placeholder="Instructor Name">
        <input id="dueDate" placeholder="Due Date">
        <textarea id="paperBody" placeholder="Paste paper body here..."></textarea>
        <textarea id="paperReferences" placeholder="Paste references here..."></textarea>
        <textarea id="apaPaperOutput" readonly placeholder="APA formatted paper will appear here..."></textarea>
        <div class="actions">
          <button id="formatAPA" type="button">Format APA Paper</button>
          <button id="copyAPAPaper" type="button">Copy</button>
          <button id="clearAPAPaper" type="button">Clear</button>
        </div>
      </article>

      <article class="tool-panel" id="professor">
        <h2>Professor Mode</h2>
        <textarea id="profRules" placeholder="Example:
APA only
Bluebook only
2 paragraph minimum
Use citations in every post"></textarea>
        <textarea id="rulesStatus" readonly placeholder="Saved professor rules will appear here..."></textarea>
        <div class="actions">
          <button id="saveRules" type="button">Save Rules</button>
          <button id="clearRules" type="button">Clear</button>
        </div>
      </article>

      <article class="tool-panel" id="studyCards">
        <h2>Study Cards</h2>
        <input id="cardClass" placeholder="Class name">
        <input id="cardChapter" placeholder="Chapter / Unit">
        <input id="cardTerm" placeholder="Term or concept">
        <textarea id="cardNotes" placeholder="Definition or notes"></textarea>
        <textarea id="cardExample" placeholder="Example"></textarea>
        <textarea id="cardQuestion" placeholder="Practice question"></textarea>
        <textarea id="cardAnswer" placeholder="Answer"></textarea>

        <div class="actions">
          <button id="addStudyCard" type="button">Add Card</button>
          <button id="clearStudyCardForm" type="button">Clear Form</button>
          <button id="clearAllStudyCards" type="button">Clear All Cards</button>
        </div>

        <div id="studyCardList" class="output-box"></div>
      </article>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
