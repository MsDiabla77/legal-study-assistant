<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Legal Study Helper</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="app-shell">

    <header class="topbar">
      <h1>Legal Study Helper</h1>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="translator">Translator</button>
      <button class="tab" data-tab="test">Test Me</button>
      <button class="tab" data-tab="reply">Reply</button>
      <button class="tab" data-tab="warnings">Warnings</button>
      <button class="tab" data-tab="citations">Citations</button>
      <button class="tab" data-tab="apaPaper">APA Paper</button>
      <button class="tab" data-tab="professor">Professor Mode</button>
    </nav>

    <section class="workspace">

      <!-- TRANSLATOR -->
      <article class="tool-panel active" id="translator">
        <h2>Translate Legal Text</h2>

        <textarea id="legalInput" placeholder="Paste legal text here..."></textarea>
        <textarea id="translationOutput" readonly placeholder="Plain English will appear here..."></textarea>

        <div class="actions">
          <button id="translateBtn">Translate</button>
          <button id="copyTranslation">Copy</button>
          <button id="clearTranslator">Clear</button>
        </div>
      </article>

      <!-- TEST ME -->
      <article class="tool-panel" id="test">
        <h2>Legal Study Practice</h2>

        <select id="studyMode">
          <option value="easy">Easy Review</option>
          <option value="medium">Medium</option>
          <option value="exam">Exam Practice</option>
        </select>

        <div id="questionList"></div>

        <div class="actions">
          <button id="makeTest">Make Questions</button>
          <button id="clearTest">Clear</button>
        </div>
      </article>

      <!-- REPLY -->
      <article class="tool-panel" id="reply">
        <h2>Reply Ideas</h2>

        <textarea id="classmatePost" placeholder="Paste classmate post..."></textarea>
        <textarea id="replyOutput" readonly placeholder="Reply ideas will appear here..."></textarea>

        <div class="actions">
          <button id="makeReply">Draft Reply</button>
          <button id="copyReply">Copy</button>
          <button id="clearReply">Clear</button>
        </div>
      </article>

      <!-- WARNINGS -->
      <article class="tool-panel" id="warnings">
        <h2>Writing Warnings</h2>

        <textarea id="warningInput" placeholder="Paste your draft to check spelling, grammar, citations..."></textarea>

        <div class="actions">
          <button id="checkDraft">Check Draft</button>
          <button id="clearWarnings">Clear</button>
        </div>

        <textarea id="warningOutput" readonly placeholder="Warnings will appear here..."></textarea>
      </article>

      <!-- CITATIONS -->
      <article class="tool-panel" id="citations">
        <h2>Citation Helper</h2>

        <input id="citeAuthor" placeholder="Author">
        <input id="citeTitle" placeholder="Title">
        <input id="citeSource" placeholder="Source">
        <input id="citeYear" placeholder="Year">
        <input id="citeURL" placeholder="URL">

        <div class="actions">
          <button id="makeAPA">Make APA</button>
          <button id="makeBluebook">Make Bluebook</button>
          <button id="clearCitations">Clear</button>
        </div>

        <textarea id="citationOutput" readonly placeholder="Citation will appear here..."></textarea>
      </article>

      <!-- APA PAPER -->
      <article class="tool-panel" id="apaPaper">
        <h2>APA 7 Paper Formatter</h2>

        <input id="paperTitle" placeholder="Paper Title">
        <input id="studentName" placeholder="Your Name">
        <input id="schoolName" placeholder="School Name">
        <input id="courseName" placeholder="Course Name">
        <input id="instructorName" placeholder="Instructor Name">
        <input id="dueDate" placeholder="Due Date">

        <textarea id="paperBody" placeholder="Paste your paper body here..."></textarea>
        <textarea id="paperReferences" placeholder="Paste references here..."></textarea>

        <div class="actions">
          <button id="formatAPA">Format APA Paper</button>
          <button id="copyAPAPaper">Copy</button>
          <button id="clearAPAPaper">Clear</button>
        </div>

        <textarea id="apaPaperOutput" readonly placeholder="APA formatted paper will appear here..."></textarea>
      </article>

      <!-- PROFESSOR MODE -->
      <article class="tool-panel" id="professor">
        <h2>Professor Mode</h2>

        <textarea id="profRules" placeholder="Example:
APA only
Bluebook only
2 paragraph minimum
Use citations in every response"></textarea>

        <div class="actions">
          <button id="saveRules">Save Rules</button>
          <button id="clearRules">Clear</button>
        </div>

        <textarea id="rulesStatus" readonly placeholder="Saved rules will appear here..."></textarea>
      </article>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
